<!DOCTYPE html>
<html>
<head>
    <title>Mini CS 2D Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: #fff; font-family: sans-serif; touch-action: none; }
        canvas { background: #2c3e50; border: 4px solid #222; max-width: 100%; max-height: 100vh; }
        .ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .btn { position: absolute; pointer-events: auto; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; user-select: none; }
        #fireBtn { right: 40px; bottom: 120px; width: 80px; height: 80px; background: rgba(231, 76, 60, 0.5); }
        #reloadBtn { right: 130px; bottom: 50px; width: 60px; height: 60px; }
        #joystick { left: 40px; bottom: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); }
        #stick { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; left: 30px; top: 30px; }
        .stats { position: absolute; top: 10px; font-size: 20px; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div class="stats">KILLS: <span id="score">0</span> | AMMO: <span id="ammo">10</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- Sterowanie mobilne -->
    <div class="ui-layer">
        <div id="joystick" class="btn"><div id="stick"></div></div>
        <div id="fireBtn" class="btn">SHOT</div>
        <div id="reloadBtn" class="btn">R</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const ammoEl = document.getElementById("ammo");

        let player = { x: 400, y: 300, angle: 0, speed: 4 };
        let bullets = [], enemies = [], blood = [];
        let score = 0, ammo = 10, isReloading = false, gameOver = false;
        let keys = {};

        // Obsługa Joysticka
        let joyActive = false, joyX = 0, joyY = 0;
        const joyBase = document.getElementById("joystick");
        const stick = document.getElementById("stick");

        joyBase.ontouchstart = () => joyActive = true;
        window.ontouchend = () => { joyActive = false; stick.style.left = "30px"; stick.style.top = "30px"; joyX = 0; joyY = 0; };
        window.ontouchmove = (e) => {
            if(!joyActive) return;
            let t = e.touches[0];
            let rect = joyBase.getBoundingClientRect();
            let dx = t.clientX - (rect.left + 50);
            let dy = t.clientY - (rect.top + 50);
            let dist = Math.min(50, Math.hypot(dx, dy));
            let ang = Math.atan2(dy, dx);
            joyX = Math.cos(ang) * (dist / 50);
            joyY = Math.sin(ang) * (dist / 50);
            stick.style.left = (30 + Math.cos(ang) * dist) + "px";
            stick.style.top = (30 + Math.sin(ang) * dist) + "px";
            player.angle = ang; // Postać patrzy tam gdzie idziemy
        };

        // Przyciski
        document.getElementById("fireBtn").ontouchstart = shoot;
        document.getElementById("reloadBtn").ontouchstart = () => { if(gameOver) location.reload(); else reload(); };

        // Komputer (Klawiatura)
        window.onkeydown = (e) => { keys[e.key.toLowerCase()] = true; if(e.key=='r') gameOver ? location.reload() : reload(); };
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        canvas.onclick = shoot;

        function reload() {
            if(isReloading || ammo === 10) return;
            isReloading = true; ammoEl.innerText = "REL...";
            setTimeout(() => { ammo = 10; isReloading = false; ammoEl.innerText = ammo; }, 800);
        }

        function shoot() {
            if (gameOver || isReloading || ammo <= 0) return;
            bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 12 });
            ammo--; ammoEl.innerText = ammo;
        }

        function spawnEnemy() {
            if(gameOver) return;
            enemies.push({ x: Math.random()*800, y: -20, speed: 1.5 + (score * 0.05) });
        }
        setInterval(spawnEnemy, 1200);

        function update() {
            if(gameOver) return;
            // Ruch (Joystick lub WSAD)
            if(joyActive) {
                player.x += joyX * player.speed;
                player.y += joyY * player.speed;
            } else {
                if(keys['w']) player.y -= player.speed;
                if(keys['s']) player.y += player.speed;
                if(keys['a']) player.x -= player.speed;
                if(keys['d']) player.x += player.speed;
            }
            
            // Kolizje i ruch pocisków (analogicznie jak wcześniej)
            bullets.forEach((b, bi) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                if(b.x<0||b.x>800||b.y<0||b.y>600) bullets.splice(bi, 1);
            });

            enemies.forEach((e, ei) => {
                let ang = Math.atan2(player.y-e.y, player.x-e.x);
                e.x += Math.cos(ang)*e.speed; e.y += Math.sin(ang)*e.speed;
                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.x-b.x, e.y-b.y)<20) {
                        enemies.splice(ei, 1); bullets.splice(bi, 1); score++; scoreEl.innerText = score;
                    }
                });
                if(Math.hypot(e.x-player.x, e.y-player.y)<25) gameOver = true;
            });
        }

        function draw() {
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(0,0,800,600);
            // Gracz
            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(-15,-15,30,30);
            ctx.fillStyle = "#333"; ctx.fillRect(12,-4,18,8); ctx.restore();
            // Pociski i Wrogowie
            ctx.fillStyle = "#f1c40f"; bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));
            ctx.fillStyle = "#e74c3c"; enemies.forEach(e => ctx.fillRect(e.x-15, e.y-15, 30, 30));

            if(gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600);
                ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "40px Arial";
                ctx.fillText("GAME OVER", 400, 300);
                ctx.font = "20px Arial"; ctx.fillText("Kliknij R lub przycisk R aby powtórzyć", 400, 340);
            }
            update(); requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
