<!DOCTYPE html>
<html>
<head>
    <title>Mini CS 2D</title>
    <style>
        body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; color: white; font-family: sans-serif; flex-direction: column; }
        canvas { background: #444; border: 5px solid #222; cursor: crosshair; }
        .stats { position: absolute; top: 20px; font-size: 24px; text-shadow: 2px 2px black; }
    </style>
</head>
<body>
    <div class="stats">Kills: <span id="score">0</span> | Ammo: <span id="ammo">10</span></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <p>WSAD - Ruch | MYSZKA - Celowanie | KLIK - Strzał | R - Przeładuj</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const ammoEl = document.getElementById("ammo");

        let player = { x: 400, y: 300, angle: 0, speed: 4 };
        let bullets = [];
        let enemies = [];
        let score = 0;
        let ammo = 10;
        let keys = {};

        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
        window.onclick = shoot;
        window.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            player.angle = Math.atan2(e.clientY - rect.top - player.y, e.clientX - rect.left - player.x);
        };

        function shoot() {
            if (ammo > 0) {
                bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 10 });
                ammo--;
                ammoEl.innerText = ammo;
            }
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let x, y;
            if(side === 0) { x = Math.random() * 800; y = -20; }
            else if(side === 1) { x = 820; y = Math.random() * 600; }
            else if(side === 2) { x = Math.random() * 800; y = 620; }
            else { x = -20; y = Math.random() * 600; }
            enemies.push({ x, y, speed: 1.5 + Math.random() * 2 });
        }
        setInterval(spawnEnemy, 1500);

        function update() {
            if(keys['w'] && player.y > 0) player.y -= player.speed;
            if(keys['s'] && player.y < 600) player.y += player.speed;
            if(keys['a'] && player.x > 0) player.x -= player.speed;
            if(keys['d'] && player.x < 800) player.x += player.speed;
            if(keys['r']) { ammo = 10; ammoEl.innerText = ammo; }

            bullets.forEach((b, bi) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                if(b.x < 0 || b.x > 800 || b.y < 0 || b.y > 600) bullets.splice(bi, 1);
            });

            enemies.forEach((e, ei) => {
                const ang = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(ang) * e.speed;
                e.y += Math.sin(ang) * e.speed;

                bullets.forEach((b, bi) => {
                    const dist = Math.hypot(e.x - b.x, e.y - b.y);
                    if(dist < 20) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score++;
                        scoreEl.innerText = score;
                    }
                });

                if(Math.hypot(e.x - player.x, e.y - player.y) < 20) {
                    alert("GGS! Zabiłeś: " + score);
                    location.reload();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            
            // Gracz
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(-15, -15, 30, 30); // Ciało
            ctx.fillStyle = "black";
            ctx.fillRect(10, -5, 20, 10); // Lufa
            ctx.restore();

            // Pociski
            ctx.fillStyle = "yellow";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));

            // Wrogowie
            ctx.fillStyle = "#e74c3c";
            enemies.forEach(e => ctx.fillRect(e.x - 15, e.y - 15, 30, 30));

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
