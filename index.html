<!DOCTYPE html>
<html>
<head>
    <title>Szybki Ping Pong - AI 80%</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: 'Courier New', monospace; flex-direction: column; }
        canvas { border: 4px solid #fff; background: #000; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <h1 id="score">0 : 0</h1>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <p>Sterowanie: STRZAŁKI | AI ma 80% skuteczności</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        let p1Score = 0, p2Score = 0;
        let p1Y = 200, p2Y = 200;
        let pSzer = 15, pWys = 100;
        
        let bX = 400, bY = 250;
        let bSpeedX = 6, bSpeedY = 4;
        let bSize = 8;

        let up = false, down = false;
        document.addEventListener("keydown", (e) => { if(e.key == "ArrowUp") up = true; if(e.key == "ArrowDown") down = true; });
        document.addEventListener("keyup", (e) => { if(e.key == "ArrowUp")  up = false; if(e.key == "ArrowDown") down = false; });

        function reset() {
            bX = canvas.width/2; bY = canvas.height/2;
            bSpeedX = (bSpeedX > 0 ? -6 : 6); 
            bSpeedY = (Math.random() > 0.5 ? 4 : -4);
        }

        function update() {
            // Twoja paletka
            if(up && p1Y > 0) p1Y -= 9;
            if(down && p1Y < canvas.height - pWys) p1Y += 9;

            // --- INTELIGENTNY ROBOT (80% skuteczności) ---
            let srodekPaletkiAI = p2Y + pWys/2;
            // Robot reaguje tylko gdy piłka leci w jego stronę i jest za połową boiska
            if (bSpeedX > 0 && bX > canvas.width / 2.5) {
                if (srodekPaletkiAI < bY - 20) {
                    p2Y += 5.5; // Prędkość bota (lekko wolniejszy od gracza)
                } else if (srodekPaletkiAI > bY + 20) {
                    p2Y -= 5.5;
                }
            }

            bX += bSpeedX; bY += bSpeedY;

            // Odbicia góra/dół
            if(bY < 0 || bY > canvas.height) bSpeedY *= -1;

            // Odbicie od Gracza
            if(bX < 30 + pSzer && bY > p1Y && bY < p1Y + pWys) {
                bSpeedX = Math.abs(bSpeedX) * 1.05; // Przyspieszenie 5%
                bSpeedX = Math.min(bSpeedX, 15); // Limit prędkości
                bX = 30 + pSzer; 
            }

            // Odbicie od AI
            if(bX > canvas.width - 30 - pSzer && bY > p2Y && bY < p2Y + pWys) {
                bSpeedX = -Math.abs(bSpeedX) * 1.05;
                bX = canvas.width - 30 - pSzer;
            }

            // Punkty
            if(bX < 0) { p2Score++; reset(); }
            if(bX > canvas.width) { p1Score++; reset(); }
            scoreElement.innerText = `${p1Score} : ${p2Score}`;
        }

        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            ctx.fillRect(30, p1Y, pSzer, pWys); 
            ctx.fillRect(canvas.width-45, p2Y, pSzer, pWys); 
            ctx.beginPath(); ctx.arc(bX, bY, bSize, 0, Math.PI*2); ctx.fill(); 
            
            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
