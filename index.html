<!DOCTYPE html>
<html>
<head>
    <title>Grow.io - Pożeraj i Rośnij</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-size: 24px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Masa: <span id="mass">10</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const massEl = document.getElementById("mass");

        // Ustawienia świata
        const WORLD_SIZE = 3000; // Wielkość mapy
        let canvasW, canvasH;
        let player = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, radius: 20, color: "#2ecc71" };
        let food = [];
        let enemies = [];
        let mouse = { x: 0, y: 0 };
        let gameOver = false;

        function resize() {
            canvasW = window.innerWidth;
            canvasH = window.innerHeight;
            canvas.width = canvasW;
            canvas.height = canvasH;
        }
        window.onresize = resize;
        resize();

        // Inicjalizacja jedzenia i przeciwników
        for(let i=0; i<500; i++) spawnFood();
        for(let i=0; i<30; i++) spawnEnemy();

        function spawnFood() {
            food.push({
                x: Math.random() * WORLD_SIZE,
                y: Math.random() * WORLD_SIZE,
                radius: 5,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`
            });
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * WORLD_SIZE,
                y: Math.random() * WORLD_SIZE,
                radius: 15 + Math.random() * 100,
                color: "#e74c3c",
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            });
        }

        // Sterowanie
        const handleInput = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            mouse.x = clientX - canvasW/2;
            mouse.y = clientY - canvasH/2;
        };
        window.onmousemove = handleInput;
        window.ontouchmove = handleInput;

        function update() {
            if(gameOver) return;

            // Ruch gracza w stronę myszki/palca
            let dist = Math.hypot(mouse.x, mouse.y);
            if(dist > 5) {
                let speed = 5 * (20 / player.radius); // Im większy, tym wolniejszy
                player.x += (mouse.x / dist) * speed;
                player.y += (mouse.y / dist) * speed;
            }

            // Granice świata
            player.x = Math.max(0, Math.min(WORLD_SIZE, player.x));
            player.y = Math.max(0, Math.min(WORLD_SIZE, player.y));

            // Zjadanie jedzenia
            food.forEach((f, i) => {
                if(Math.hypot(player.x - f.x, player.y - f.y) < player.radius) {
                    food.splice(i, 1);
                    player.radius += 0.5;
                    massEl.innerText = Math.floor(player.radius);
                    spawnFood();
                }
            });

            // Logika przeciwników
            enemies.forEach((e, i) => {
                e.x += e.vx; e.y += e.vy;
                // Odbijanie od ścian
                if(e.x < 0 || e.x > WORLD_SIZE) e.vx *= -1;
                if(e.y < 0 || e.y > WORLD_SIZE) e.vy *= -1;

                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                
                if(distToPlayer < player.radius + e.radius - 5) {
                    if(player.radius > e.radius * 1.1) {
                        // My zjadamy bota
                        player.radius += e.radius * 0.2;
                        enemies.splice(i, 1);
                        spawnEnemy();
                        massEl.innerText = Math.floor(player.radius);
                    } else if(e.radius > player.radius * 1.1) {
                        // Bot zjada nas
                        gameOver = true;
                    }
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvasW, canvasH);

            // Kamera podąża za graczem
            ctx.save();
            ctx.translate(canvasW/2 - player.x, canvasH/2 - player.y);

            // Rysowanie siatki tła
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            for(let i=0; i<=WORLD_SIZE; i+=100) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke();
            }

            // Rysowanie jedzenia
            food.forEach(f => {
                ctx.fillStyle = f.color;
                ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fill();
            });

            // Rysowanie przeciwników
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
            });

            // Rysowanie gracza
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();

            ctx.restore();

            if(gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(0, 0, canvasW, canvasH);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "40px Arial";
                ctx.fillText("ZOSTAŁEŚ POŻARTY!", canvasW/2, canvasH/2);
                ctx.font = "20px Arial";
                ctx.fillText("Odśwież stronę, aby spróbować ponownie", canvasW/2, canvasH/2 + 50);
            }

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
