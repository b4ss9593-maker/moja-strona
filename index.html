<!DOCTYPE html>
<html>
<head>
    <title>Ping Pong na GitHubie</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: 'Courier New', Courier, monospace; flex-direction: column; }
        canvas { border: 5px solid white; background: black; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>PING PONG</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <p>Sterowanie: Strzałki GÓRA / DÓŁ</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Parametry
        let paletkaY = 250;
        const paletkaSzer = 15, paletkaWys = 100;
        let pilkaX = 400, pilkaY = 300;
        let p_x = 6, p_y = 6;
        const pilkaPromien = 10;
        
        // Punkty
        let punktyGracza = 0;
        let punktyAI = 0;

        // Sterowanie
        let upPressed = false, downPressed = false;
        document.addEventListener("keydown", (e) => { if(e.key == "ArrowUp") upPressed = true; if(e.key == "ArrowDown") downPressed = true; });
        document.addEventListener("keyup", (e) => { if(e.key == "ArrowUp") upPressed = false; if(e.key == "ArrowDown") downPressed = false; });

        function draw() {
            // Czyścimy tło
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Linia środkowa
            ctx.strokeStyle = "white";
            ctx.setLineDash([10, 10]);
            ctx.beginPath(); ctx.moveTo(400, 0); ctx.lineTo(400, 600); ctx.stroke();

            // Rysujemy punkty
            ctx.font = "50px Courier New";
            ctx.fillText(punktyGracza, 200, 70);
            ctx.fillText(punktyAI, 550, 70);

            // Rysujemy paletkę (Gracz)
            ctx.fillStyle = "white";
            ctx.fillRect(30, paletkaY, paletkaSzer, paletkaWys);

            // Rysujemy paletkę (AI - prawa strona)
            ctx.fillRect(canvas.width - 45, pilkaY - 50, paletkaSzer, paletkaWys);

            // Rysujemy piłkę
            ctx.beginPath();
            ctx.arc(pilkaX, pilkaY, pilkaPromien, 0, Math.PI*2);
            ctx.fill();

            // Ruch paletki
            if(upPressed && paletkaY > 0) paletkaY -= 8;
            if(downPressed && paletkaY < canvas.height - paletkaWys) paletkaY += 8;

            // Ruch piłki
            pilkaX += p_x; pilkaY += p_y;

            // Odbicia góra/dół
            if(pilkaY + p_y < 0 || pilkaY + p_y > canvas.height) p_y = -p_y;

            // Odbicie od prawej strony (AI)
            if(pilkaX + p_x > canvas.width - 45) {
                if(pilkaY > pilkaY - 50 && pilkaY < pilkaY + 50) p_x = -p_x;
                else { punktyGracza++; resetPilki(); }
            }

            // Kolizja z Twoją paletką
            if(pilkaX - pilkaPromien < 30 + paletkaSzer && pilkaY > paletkaY && pilkaY < paletkaY + paletkaWys) {
                p_x = -p_x;
                pilkaX = 30 + paletkaSzer + pilkaPromien; // zapobiega zacięciu
            }

            // Reset jak przegrasz (lewa strona)
            if(pilkaX < 0) {
                punktyAI++;
                resetPilki();
            }

            requestAnimationFrame(draw);
        }

        function resetPilki() {
            pilkaX = 400; pilkaY = 300;
            p_x = -p_x;
        }

        draw();
    </script>
</body>
</html>
